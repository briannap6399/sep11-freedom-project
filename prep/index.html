<script type="module">
import kaboom from "https://unpkg.com/kaboom@3000.0.1/dist/kaboom.mjs";
kaboom();
// ------------------------------------------------------------------------------------------

/* Setting up Variables */

var conListQues = ["Hablar; Yo (Present Tense)", "Vivir; El (Present Tense)","Salir; Nosotras (Present Tense)","Beber; Ella (Present Tense)","Pintar; Ustedes (Present Tense)", "Comer; Ellas (Present Tense)", "Tener; Tu (Present Tense)", "Escuchar; Yo (Present Tense)", "Ser; Nosotros (Present Tense)", "Hacer; Usted (Present Tense)", "Ir; Ellos (Present Tense)"];
var conListAns = ["Hablo","Vive","Salimos","Bebe","Pintan", "Comen", "Tienes", "Eschucho", "Somos", "Hace", "Van"];
console.log(conListQues);
var vocabListQues = ["Language", "Escuela", "Night", "Trabajando"];
var vocabListAns = ["Idioma", "School", "Noche", "Working"]
var movSpeed = 500;
// var enemSpeed = 400;
setGravity(1000);

add([
    text("Click here to play!"),
    pos(500,250),
    area(),
    "title-card"
])
onClick("title-card", () => go("option-sect")),

scene("option-sect",() => {
    add([
        text("Conjugation"),
        pos(250,250),
        area(),
        "conjugation"
    ])

    add([
        text("Vocab"),
        pos(800,250),
        area(),
        "vocab"
    ])

    onClick("conjugation", () => go("plat-one-con"));

scene("plat-one-con",() => {
/* Necessary Sprites */

 loadSprite("cursor", "/project-images/cursor.png"); // Player Sprite (Temporary)
 loadSprite("checkpoint", "/project-images/checkpoint.png"); // Gateway to Levels
 loadBean()

 add([
    sprite("bean"),
    scale(.75),
    area(),
    body(),
    pos(1000,100),
    "enemy"
 ])

 var cursSprite = add([
        sprite("cursor"),
        scale(.10),
        area(),
        body(),
        pos(0,100),
 ])

var checkpoint = add([
    sprite("checkpoint"),
    scale(.50),
    area(),
    body({isStatic: true}),
    pos(1100,100),
    "checkpoint"
])

/* Platforms*/

    add([
      rect(width(), 48),
      pos(0,height() - 48),
      area(),
      body({isStatic: true}),
    ])

    add([
        rect(300,48),
        pos(900,300),
        area(),
        body({isStatic: true}),
     ])

     add([
        rect(100,100),
        pos(600,400),
        area(),
        body({isStatic: true}),
     ])

    /* Moves for the sprite */

    onKeyDown("left",() => {
        cursSprite.move(-movSpeed,0);
    })

    onKeyDown("right",() => {
        cursSprite.move(movSpeed,0);
    })

    onKeyDown("space",() => {
        if(cursSprite.isGrounded()) {
          cursSprite.jump();
        }
    })

    cursSprite.onCollide("enemy",() => {
        go("status-con");
        })

    cursSprite.onCollide("checkpoint",() => {
        alert("Let's test your knowledge!");
        go("check-point-con");
        })
  })
})

 scene("status-con",() => {
       var quesNum = randi(0,11);
       var ques = prompt(conListQues[quesNum]);
        if(ques == conListAns[quesNum]) {
        alert("That's correct!");
        go("plat-one-con");

    } else {
        alert("Study Harder Bozo.");
        go("plat-one-con");
    }
    })

    scene("check-point-con",() => {
         var quesNum = randi(0,11);
       var ques = prompt(conListQues[quesNum]);
        if(ques == conListAns[quesNum]) {
        alert("That's correct! You're ready to move to the next level!");
        go("plat-one-con");
          } else {
        alert("You'll need to try again..");
        go("plat-one-con");
    }

    })



</script>
