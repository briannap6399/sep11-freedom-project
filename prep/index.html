<script type="module">
import kaboom from "https://unpkg.com/kaboom@3000.0.1/dist/kaboom.mjs";
kaboom();
// ------------------------------------------------------------------------------------------

/* Setting up Variables */

var conListQues = ["Hablar; Yo (Present Tense)", "Vivir; El (Present Tense)","Salir; Nosotras (Present Tense)","Beber; Ella (Present Tense)","Pintar; Ustedes (Present Tense)"];
var conListAns = ["Hablo","Vive","Salemos","Bebe","Pintan"]
console.log(conListQues);
var movSpeed = 500;
setGravity(1000);

add([
    text("Click here to play!"),
    pos(500,250),
    area(),
    "title-card"
])
onClick("title-card", () => go("option-sect")),

scene("option-sect",() => {
    add([
        text("Vocabulary"),
        pos(250,250),
        area(),
        "vocab"
    ])

    add([
        text("Conjugation"),
        pos(800,250),
        area(),
        "conjugation"
    ])

    onClick("vocab", () => go("plat-one"));

scene("plat-one",() => {
/* Necessary Sprites */

 loadSprite("cursor", "/project-images/cursor.png");
 loadBean()

 add([
    sprite("bean"),
    scale(.75),
    area(),
    body(),
    pos(1000,100),
    "enemy"
 ])

 var cursSprite = add([
        sprite("cursor"),
        scale(.10),
        area(),
        body(),
        pos(0,100),

/* Platform */

    ])
    add([
      rect(width(), 48),
      pos(0,height() - 48),
      area(),
      body({isStatic: true}),
    ])

    /* Moves for the sprite */

    onKeyDown("left",() => {
        cursSprite.move(-movSpeed,0);
    })

    onKeyDown("right",() => {
        cursSprite.move(movSpeed,0);
    })

    onKeyDown("space",() => {
        if(cursSprite.isGrounded()) {
          cursSprite.jump();
        }
    })

cursSprite.onCollide("enemy",() => {
    go("test-page");
    })
})

    scene("test-page",() => {
       var quesNum = randi(0,4);
       var ques = prompt(conListQues[quesNum]);
        if(ques == conListAns[quesNum]) {
        console.log("That's correct!");
    } else {
        console.log("Study Harder Bozo.")
    }
    })


})


</script>
